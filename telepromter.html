<!doctype html>
<html lang="es">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Setlist Prompter</title>
		<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
		<style>
			:root {
				--bg-dark: #121212;
				--accent: #f59e0b;
				--text-main: #f5f5f5;
			}
			body {
				background-color: var(--bg-dark);
				color: var(--text-main);
				font-family: sans-serif;
				overflow: hidden;
			}
			.view {
				display: none;
				height: 100vh;
				width: 100vw;
				flex-direction: column;
			}
			.view.active {
				display: flex;
			}
			#contenedor-visor {
				width: 100%;
				height: 80vh;
				overflow: hidden;
				position: relative;
				background: #000;
			}
			.pdf-renderizado {
				width: 100%;
				transform: translateZ(0);
				will-change: transform;
				backface-visibility: hidden;
				transition: transform 0.05s linear;
			}
			.card {
				background: #1e1e1e;
				padding: 15px;
				margin: 10px;
				border-radius: 8px;
				display: flex;
				justify-content: space-between;
			}
		</style>
	</head>
	<body>
		<div id="view-dashboard" class="view active">
			<header style="padding: 20px"><h1>🎵 Mi Repertorio</h1></header>
			<div id="list-pending"></div>
			<button onclick="document.getElementById('input-pdf').click()">+ Cargar PDF</button>
			<input type="file" id="input-pdf" accept=".pdf" style="display: none" />
		</div>

		<div id="view-prompter" class="view">
			<div class="prompter-controls">
				<button onclick="stopPrompter()">⬅ Volver</button>
				<span id="prompter-title"></span>
			</div>
			<div id="contenedor-visor"></div>
		</div>

		<script>
			// 1. CONFIGURACIÓN DB
			let db;
			const request = indexedDB.open("TeleprompterDB", 1);
			request.onupgradeneeded = (e) => {
				e.target.result.createObjectStore("archivos", {keyPath: "id"});
			};
			request.onsuccess = (e) => {
				db = e.target.result;
				renderizarListas();
			};

			// 2. LÓGICA DE ARCHIVOS
			document.getElementById("input-pdf").addEventListener("change", async (e) => {
				const file = e.target.files[0];
				const reader = new FileReader();
				reader.onload = () => {
					const id = Date.now();
					const obj = {id, title: file.name, data: reader.result, status: "pending", type: "PDF"};
					const tx = db.transaction("archivos", "readwrite");
					tx.objectStore("archivos").put(obj);
					tx.oncomplete = () => renderizarListas();
				};
				reader.readAsArrayBuffer(file);
			});

			// 3. RENDERIZADO OPTIMIZADO (Solución tablet)
			async function abrirPrompter(id) {
				const tx = db.transaction("archivos", "readonly");
				const archivo = await new Promise((r) => (tx.objectStore("archivos").get(id).onsuccess = (e) => r(e.target.result)));

				document.getElementById("view-dashboard").classList.remove("active");
				document.getElementById("view-prompter").classList.add("active");

				const pdf = await pdfjsLib.getDocument({data: archivo.data}).promise;
				const page = await pdf.getPage(1);
				const viewport = page.getViewport({scale: 2.0});
				const canvas = document.createElement("canvas");
				const context = canvas.getContext("2d");
				canvas.height = viewport.height;
				canvas.width = viewport.width;

				await page.render({canvasContext: context, viewport}).promise;

				// CONVERSIÓN A IMAGEN PARA QUE LA TABLET NO SE TRABE
				const img = document.createElement("img");
				img.src = canvas.toDataURL("image/png");
				img.classList.add("pdf-renderizado");

				const cont = document.getElementById("contenedor-visor");
				cont.innerHTML = "";
				cont.appendChild(img);
			}

			function renderizarListas() {
				const tx = db.transaction("archivos", "readonly");
				tx.objectStore("archivos").getAll().onsuccess = (e) => {
					const lista = document.getElementById("list-pending");
					lista.innerHTML = e.target.result
						.map(
							(a) => `
                    <div class="card">
                        ${a.title}
                        <button onclick="abrirPrompter(${a.id})">▶</button>
                        <button onclick="eliminarArchivo(${a.id})">🗑️</button>
                    </div>
                `,
						)
						.join("");
				};
			}

			function eliminarArchivo(id) {
				const tx = db.transaction("archivos", "readwrite");
				tx.objectStore("archivos").delete(id);
				tx.oncomplete = () => renderizarListas();
			}

			function stopPrompter() {
				document.getElementById("view-prompter").classList.remove("active");
				document.getElementById("view-dashboard").classList.add("active");
			}
		</script>
	</body>
</html>
